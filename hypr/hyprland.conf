# Windows 11-style Hyprland configuration
# Reference: https://wiki.hypr.land/Configuring/Variables/

source = ~/.config/hypr/colors.conf

# Monitor
monitor = , 1920x1080@60, 0x0, 1

# Startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swww-daemon
exec-once = quickshell -p ~/.config/quickshell/shell.qml
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --watch cliphist store
exec-once = hypridle

# Environment variables
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = GDK_BACKEND, wayland, x11
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, qt6ct
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland
env = MOZ_ENABLE_WAYLAND, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = XDG_SESSION_TYPE, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland
env = TERMINAL, kitty
env = TERM, kitty

# NVIDIA (remove if not using NVIDIA)
env = LIBVA_DRIVER_NAME, nvidia
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = GBM_BACKEND, nvidia-drm
env = WLR_NO_HARDWARE_CURSORS, 1

# GTK
env = GDK_SCALE, 1
env = GDK_DPI_SCALE, 1
env = GTK_THEME, adw-gtk3-dark
env = GTK_USE_PORTAL, 1

# General settings
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(0078d4ff) rgba(005a9eff) 45deg
    col.inactive_border = rgba(333333ff)
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    allow_tearing = false
    layout = dwindle
}

# Decoration
decoration {
    rounding = 8

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000040)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        special = true
        popups = true
        brightness = 0.9
        contrast = 1.0
    }
}

# Animations
animations {
    enabled = yes

    bezier = win, 0.2, 0.9, 0.1, 1.0
    bezier = winOut, 0.1, 0.0, 0.8, 1.0
    bezier = overshoot, 0.05, 0.9, 0.1, 1.05
    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 0.5, win, slide
    animation = windowsIn, 1, 0.5, win, slide
    animation = windowsOut, 1, 0.4, winOut, slide
    animation = windowsMove, 1, 0.4, smooth, slide
    animation = fadeIn, 1, 0.3, smooth
    animation = fadeOut, 1, 0.2, smooth
    animation = fade, 1, 0.3, smooth
    animation = layers, 1, 0.3, smooth
    animation = layersIn, 1, 0.3, smooth
    animation = layersOut, 1, 0.2, smooth
    animation = workspaces, 1, 0.5, overshoot, slide
    animation = specialWorkspace, 1, 0.5, overshoot, slidevert
}

# Input
input {
    kb_layout = us
    numlock_by_default = true
    repeat_rate = 40
    repeat_delay = 300
    follow_mouse = 1
    accel_profile = adaptive
    sensitivity = 0.0
    natural_scroll = 0

    touchpad {
        natural_scroll = 0
        disable_while_typing = true
        tap-to-click = true
        tap-and-drag = true
    }
}

# Cursor
cursor {
    no_warps = true
    enable_hyprcursor = true
}

# Gestures - removed due to syntax changes in Hyprland 0.53+

# Dwindle layout
dwindle {
    pseudotile = true
    preserve_split = true
}

# Master layout
master {
    new_status = master
}

# Misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    focus_on_activate = true
}

# Per-device settings
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Variables
$mainMod = SUPER

# Keybinds
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, quickshell ipc call shell togglePowerMenu
bind = $mainMod, M, fullscreen, 1

# Launchers
bind = $mainMod, D, exec, quickshell ipc call shell toggleStartMenu
bind = $mainMod, S, exec, quickshell ipc call shell toggleStartMenu
bind = $mainMod, A, exec, quickshell ipc call shell toggleActionCenter
bind = $mainMod, W, exec, quickshell ipc call shell toggleWidgets
bind = $mainMod, E, exec, nautilus
bind = $mainMod, B, exec, chromium

# Window state
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, J, togglesplit

# Window movement
bind = $mainMod, left, movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up, movewindow, u
bind = $mainMod, down, movewindow, d

# Focus movement
bind = $mainMod ALT, left, movefocus, l
bind = $mainMod ALT, right, movefocus, r
bind = $mainMod ALT, up, movefocus, u
bind = $mainMod ALT, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

# Alt+Tab
bind = ALT, TAB, workspace, previous

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = SHIFT, Print, exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = CONTROL, Print, exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = $mainMod, Print, exec, hyprpicker -f hex -a

# Wallpaper
bind = $mainMod, C, exec, bash ~/.config/hypr/scripts/theme.sh pick

# Media keys
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bindel = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Lock
bind = $mainMod, L, exec, hyprlock

# Window actions
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, T, togglefloating, 0
bind = $mainMod SHIFT, T, center

# Maximize
bind = $mainMod SHIFT, M, pin

# Theme toggle (dark/light mode)
bind = $mainMod SHIFT, L, exec, bash ~/.config/hypr/scripts/theme.sh toggle

# Wallpaper selector
bind = $mainMod, Y, exec, quickshell ipc call shell toggleWallpaperSelector

# Close panels/menus with ESC
bind = , Escape, exec, quickshell ipc call shell closePanels

# Clipboard
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/clipboard.sh show

# Night Light
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/nightlight.sh toggle

# Editor
bind = $mainMod, I, exec, kitty -e nvim ~/.config/hypr/hyprland.conf

# Window rules (Hyprland 0.53+ syntax)
# All windows float by default (Windows 11 style)
windowrule = float on, match:class .*

# QuickShell - always on top, no decoration
windowrule = float on, match:class ^(quickshell)$
windowrule = pin on, match:class ^(quickshell)$
windowrule = animation none, match:class ^(quickshell)$
windowrule = border_size 0, match:class ^(quickshell)$
windowrule = no_shadow on, match:class ^(quickshell)$
windowrule = no_blur on, match:class ^(quickshell)$

# Size and center specific apps
windowrule = size 800 600, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = center on, match:class ^(org.pulseaudio.pavucontrol)$

windowrule = size 400 500, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

windowrule = size 600 400, match:class ^(nm-connection-editor)$
windowrule = center on, match:class ^(nm-connection-editor)$

windowrule = size 1100 700, match:class ^(steam)$
windowrule = center on, match:class ^(steam)$

windowrule = size 900 600, match:class ^(kitty)$
windowrule = center on, match:class ^(kitty)$

windowrule = size 1200 800, match:class ^(chromium)$
windowrule = center on, match:class ^(chromium)$

windowrule = size 900 600, match:class ^(nautilus)$
windowrule = center on, match:class ^(nautilus)$
