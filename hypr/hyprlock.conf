# Windows 11 style lock screen
background {
    monitor =
    color = rgba(0, 0, 0, 1.0)
    path = 
    blur_size = 8
    blur_passes = 3
}

# Time display (large, centered)
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 96
    font_family = Segoe UI
    position = 0, -120
    halign = center
    valign = center
}

# Date display
label {
    monitor =
    text = $DATE
    color = rgba(255, 255, 255, 0.8)
    font_size = 24
    font_family = Segoe UI
    position = 0, -40
    halign = center
    valign = center
}

# Password field
input-field {
    monitor =
    size = 320, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(0, 120, 212, 1.0)
    inner_color = rgba(30, 30, 30, 0.8)
    font_color = rgba(255, 255, 255, 1.0)
    font_family = Segoe UI
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, 40
    halign = center
    valign = center
}

# User avatar placeholder
label {
    monitor =
    text = 
    color = rgba(255, 255, 255, 1.0)
    font_size = 48
    position = 0, 120
    halign = center
    valign = center
}
